stages:
  - test
  - build
  - package
  - plan
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/devops-homework"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  # Propagated to helm/terraform
  TF_VAR_image_tag: "$CI_COMMIT_SHORT_SHA"

.python_image: &python_image
  image: python:3.11-slim
  before_script:
    - python --version
    - pip install --no-cache-dir -r app/requirements.txt

unit_tests:
  <<: *python_image
  stage: test
  script:
    - cd app
    - python -m pytest -q
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - app/.pytest_cache/

lint_python:
  <<: *python_image
  stage: test
  script:
    - pip install --no-cache-dir flake8
    - flake8 app

build_image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG app
    - docker build -t $IMAGE_NAME:latest app
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  needs:
    - unit_tests
    - lint_python
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

package_chart:
  stage: package
  image: alpine/helm:3.14.4
  script:
    - helm lint helm
    # image.tag for recently pushed image
    - helm template helm --set image.tag=$IMAGE_TAG > /tmp/rendered.yaml
  artifacts:
    expire_in: 1 week
    paths:
      - /tmp/rendered.yaml
  needs:
    - build_image
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

plan_deploy:
  stage: plan
  image: hashicorp/terraform:1.8.5
  script:
    - echo "Initializing Terraform"
    - terraform -chdir=terraform init -input=false
    - echo "Creating Terraform plan"
    - terraform -chdir=terraform plan -var="image_tag=$IMAGE_TAG" -out=tfplan -input=false
  artifacts:
    expire_in: 1 day
    paths:
      - terraform/tfplan
  needs:
    - package_chart
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

apply_deploy:
  stage: deploy
  image: hashicorp/terraform:1.8.5
  script:
    - echo "Applying the approved Terraform plan"
    - terraform -chdir=terraform apply -input=false terraform/tfplan
  needs:
    - plan_deploy
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual