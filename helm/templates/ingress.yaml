{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-myapp
spec:
  rules:
    - host: {{ required "ingress.host is required when ingress.enabled=true" .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-myapp
                port:
                  number: {{ .Values.service.port }}
{{- end }}